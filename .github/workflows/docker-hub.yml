# Docker Hub: Variable DOCKERHUB_USERNAME или Secret с тем же именем (если Variable пустая).
# Secrets: DOCKERHUB_TOKEN, VPS_*, VPS_DEPLOY_DIR. Для SSH задайте VPS_PORT=22 если нестандартный порт.

name: InfraHub build & deploy

on:
  push:
    branches: [main, master, feat/deploy]

env:
  # Один логин для login + тегов образов
  DOCKER_HUB_LOGIN: ${{ vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка логина Docker Hub
        run: |
          if [ -z "$DOCKER_HUB_LOGIN" ]; then
            echo "::error::Задайте в репозитории Variable DOCKERHUB_USERNAME или Secret DOCKERHUB_USERNAME"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_LOGIN }}/infrahub-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_LOGIN }}/infrahub-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_DEPLOY_DIR }}/

      - uses: appleboy/ssh-action@master
        env:
          DH_USER: ${{ env.DOCKER_HUB_LOGIN }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DH_USER,DH_TOKEN,DEPLOY_DIR
          script: |
            set -euo pipefail
            if [ -z "${DH_USER:-}" ]; then echo "DOCKER_HUB_LOGIN пустой"; exit 1; fi
            cd "$DEPLOY_DIR"
            printf '%s' "$DH_TOKEN" | docker login -u "$DH_USER" --password-stdin
            export DOCKER_USER="$DH_USER"
            docker compose pull
            docker compose up -d --remove-orphans
            docker logout
