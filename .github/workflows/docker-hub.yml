# Variables: DOCKERHUB_USERNAME (логин на Docker Hub)
# Secrets: DOCKERHUB_TOKEN, VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT (например 22), VPS_DEPLOY_DIR (например /root/infrahub)
# На VPS: в VPS_DEPLOY_DIR лежит .env с JWT_SECRET=...

name: InfraHub build & deploy

on:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/infrahub-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/infrahub-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_DEPLOY_DIR }}/

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        env:
          DH_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DH_USER,DH_TOKEN
          script: |
            cd ${{ secrets.VPS_DEPLOY_DIR }}
            printf '%s' "$DH_TOKEN" | docker login -u "$DH_USER" --password-stdin
            export DOCKER_USER="$DH_USER"
            docker compose pull
            docker compose up -d --remove-orphans
            docker logout
