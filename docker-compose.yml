services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infrahub
      POSTGRES_PASSWORD: infrahub
      POSTGRES_DB: infrahub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrahub -d infrahub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
