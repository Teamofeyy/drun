# Один файл и для ноутбука, и для VPS.
#
# Локально: docker compose up --build
#   Образы собираются и тегируются как local/infrahub-* (см. image + build).
#   UI: http://localhost:3000  Postgres: localhost:5432  Redis: 6379  API: 8080
#
# На VPS (CI подставляет DOCKER_USER): docker compose pull && docker compose up -d
#   В .env обязательно: DOCKER_USER, JWT_SECRET
#   Для нормального HTTPS снаружи часто: FRONTEND_HTTP=80 FRONTEND_HTTPS_BIND=443

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infrahub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infrahub}
      POSTGRES_DB: infrahub
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrahub -d infrahub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${DOCKER_USER:-local}/infrahub-backend:latest
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://infrahub:${POSTGRES_PASSWORD:-infrahub}@postgres:5432/infrahub
      REDIS_URL: redis://redis:6379
      BIND: 0.0.0.0:8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: ${DOCKER_USER:-local}/infrahub-frontend:latest
    ports:
      - "${FRONTEND_HTTP:-3000}:80"
      - "${FRONTEND_HTTPS_BIND:-30443}:443"
    environment:
      CADDY_CONFIG_PATH: ${CADDY_CONFIG_PATH:-/etc/caddy/Caddyfile}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
